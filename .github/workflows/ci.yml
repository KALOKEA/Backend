name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

      - name: Check for stray debug files
        run: |
          if find src -name "*.js" | grep -v ".spec." | grep -q .; then
            echo "Warning: .js files found in src/ — remove before shipping"
            find src -name "*.js"
          fi
